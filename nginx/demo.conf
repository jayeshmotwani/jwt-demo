# Nginx config template for a codecrumbs.in demo.
# TODO: Replace DEMO_NAME with your concept slug (e.g. "jwt-auth")
# TODO: Replace PORT with the port your FastAPI backend listens on (e.g. 8001)
# TODO: Replace the static root path with where you build/serve the React app

server {
    # Listen on port 80 for HTTP traffic.
    # Certbot will add a port-443 block when you run it for HTTPS.
    listen 80;

    # The public domain for this demo.
    # TODO: Replace with your actual subdomain, e.g. jwt.codecrumbs.in
    server_name DEMO_NAME.codecrumbs.in;

    # Serve the built React frontend from this directory.
    # Run `npm run build` in frontend/ and copy the dist/ folder here,
    # or symlink it.
    root /var/www/DEMO_NAME/dist;
    index index.html;

    # SPA fallback: any path that doesn't match a real file is served
    # as index.html so React Router (if used) can handle it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* requests to the FastAPI backend running on localhost.
    # The backend is managed by systemd (see ../systemd/demo.service).
    location /api/ {
        proxy_pass http://127.0.0.1:PORT;

        # Forward the real client IP so FastAPI can log it.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Forward the original Host header.
        proxy_set_header Host $host;
    }
}
